<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --fs-xs:14px; --fs-sm:16px; --fs-base:18px; --fs-md:20px;
  --fs-lg:24px; --fs-xl:28px; --fs-2xl:34px;
  --q-blue:#1d6fcf; --q-blue-bg:#e8f1fc;
  --sec-a:#0e7f5e; --sec-b:#7c3aed;
  --radius:12px; --radius-sm:8px;
  --touch:52px;
}
@media(max-width:480px){
  :root{--fs-xs:13px;--fs-sm:15px;--fs-base:17px;--fs-md:19px;--fs-lg:22px;--fs-xl:25px;--fs-2xl:28px;}
}
body{font-size:var(--fs-base);}

.wrap{max-width:660px;margin:0 auto;padding:16px 14px 40px;}

/* TOPIC CARDS */
.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:500px){.topic-grid{grid-template-columns:repeat(2,1fr);}}
.topic-card{border-radius:var(--radius-sm);padding:13px 12px;border:2px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;transition:all 0.15s;}
.topic-card:hover,.topic-card:active{border-color:var(--q-blue);background:var(--q-blue-bg);}
.topic-icon{font-size:26px;line-height:1;display:block;margin-bottom:6px;}
.topic-label{font-size:var(--fs-sm);font-weight:600;color:var(--q-blue);display:block;margin-bottom:3px;}
.topic-desc{font-size:var(--fs-xs);color:var(--color-text-secondary);line-height:1.4;display:block;}

/* BACK BAR */
.back-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--color-background-secondary);border:2px solid var(--color-border-secondary);border-radius:var(--radius);margin-bottom:16px;cursor:pointer;transition:border-color 0.15s;min-height:var(--touch);}
.back-bar:hover{border-color:var(--q-blue);}
.back-bar-arrow{font-size:24px;color:var(--q-blue);}
.back-bar-title{font-size:var(--fs-md);font-weight:600;color:var(--q-blue);}
.back-bar-sub{font-size:var(--fs-xs);color:var(--color-text-secondary);}

/* QUESTION BOX */
.qbox{background:var(--color-background-primary);border:2px solid var(--color-border-tertiary);border-radius:var(--radius);padding:22px 20px 20px;margin-bottom:14px;transition:border-color 0.2s;}
.qbox.correct{border-color:#16a34a;}
.qbox.wrong{border-color:#dc2626;}
.qbox-num{font-size:var(--fs-xs);font-weight:700;color:var(--q-blue);text-transform:uppercase;letter-spacing:0.08em;}
.qbox-ctx{font-size:var(--fs-base);color:var(--color-text-secondary);line-height:1.65;margin:10px 0 6px;}
.qbox-q{font-size:var(--fs-lg);font-weight:700;color:var(--q-blue);line-height:1.45;margin:8px 0 18px;}
.qbox-divider{border-top:2px solid var(--color-border-tertiary);padding-top:16px;}

/* BUTTONS */
.btn-check{width:100%;padding:16px;font-size:var(--fs-md);font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--q-blue);color:#fff;cursor:pointer;margin-bottom:12px;min-height:var(--touch);letter-spacing:0.02em;transition:opacity 0.15s;}
.btn-check:disabled{opacity:0.4;cursor:default;}
.btn-check:hover:not(:disabled){opacity:0.88;}
.btn-nav{padding:12px 20px;font-size:var(--fs-base);font-weight:600;border-radius:var(--radius-sm);cursor:pointer;min-height:var(--touch);transition:opacity 0.15s;}
.btn-nav:disabled{opacity:0.35;cursor:default;}
.btn-nav.outline{border:2px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);}
.btn-nav.solid{border:none;background:var(--q-blue);color:#fff;}
.btn-nav.solid:disabled{background:var(--color-border-secondary);}

/* FEEDBACK */
.feedback{border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;}
.feedback.ok{background:#f0fdf4;border:2px solid #16a34a;}
.feedback.bad{background:#fef2f2;border:2px solid #dc2626;}
.feedback-icon{font-size:28px;line-height:1;flex-shrink:0;}
.feedback-title{font-size:var(--fs-md);font-weight:700;margin-bottom:5px;}
.feedback.ok .feedback-title{color:#15803d;}
.feedback.bad .feedback-title{color:#b91c1c;}
.feedback-text{font-size:var(--fs-base);line-height:1.6;}
.feedback.ok .feedback-text{color:#166534;}
.feedback.bad .feedback-text{color:#991b1b;}

/* SPEAK BUTTON */
.sp-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:2px solid var(--color-border-secondary);background:none;cursor:pointer;font-size:var(--fs-sm);color:var(--color-text-secondary);min-height:40px;transition:all 0.15s;}
.sp-btn:hover{background:var(--color-background-secondary);border-color:var(--q-blue);color:var(--q-blue);}
.sp-btn.on{background:#eff6ff;border-color:var(--q-blue);color:var(--q-blue);}
.sp-err{font-size:var(--fs-xs);color:#dc2626;margin-top:6px;}

/* PROGRESS */
.prog-bar-wrap{height:8px;border-radius:4px;background:var(--color-background-secondary);overflow:hidden;margin-bottom:16px;}
.prog-bar{height:100%;border-radius:4px;background:var(--q-blue);transition:width 0.3s;}

/* INPUTS */
.inp{border:2px solid var(--color-border-secondary);border-radius:var(--radius-sm);padding:10px 14px;font-size:var(--fs-base);background:var(--color-background-primary);color:var(--color-text-primary);min-height:var(--touch);}
.inp:disabled{opacity:0.6;}

/* MC */
.mc-grid{display:grid;gap:10px;margin-top:6px;}
.mc-grid.cols2{grid-template-columns:1fr 1fr;}
@media(max-width:420px){.mc-grid.cols2{grid-template-columns:1fr;}}
.mc-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--color-border-tertiary);border-radius:var(--radius-sm);cursor:pointer;font-size:var(--fs-base);transition:all 0.15s;min-height:var(--touch);}
.mc-opt:hover:not(.locked){border-color:var(--q-blue);background:var(--q-blue-bg);}
.mc-opt.sel{border-color:var(--q-blue);background:var(--q-blue-bg);color:var(--q-blue);font-weight:600;}
.mc-opt.locked:not(.sel){opacity:0.5;cursor:default;}
.mc-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--color-border-secondary);flex-shrink:0;}
.mc-opt.sel .mc-dot{background:var(--q-blue);border-color:var(--q-blue);}

/* SHAPE GRID */
.shape-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.shape-opt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px;border:2px solid var(--color-border-tertiary);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;}
.shape-opt:hover:not(.locked){border-color:var(--q-blue);background:var(--q-blue-bg);}
.shape-opt.sel{border-color:var(--q-blue);background:var(--q-blue-bg);}
.shape-opt.locked:not(.sel){opacity:0.5;cursor:default;}
.shape-label{font-size:var(--fs-sm);font-weight:600;color:var(--q-blue);}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:14px;}
.sec-hdr.a{background:#ecfdf5;border:2px solid #6ee7b7;}
.sec-hdr.b{background:#f5f3ff;border:2px solid #c4b5fd;}
.sec-hdr-label{font-size:var(--fs-md);font-weight:700;}
.sec-hdr.a .sec-hdr-label{color:var(--sec-a);}
.sec-hdr.b .sec-hdr-label{color:var(--sec-b);}
.sec-hdr-sub{font-size:var(--fs-xs);margin-top:2px;}
.sec-hdr.a .sec-hdr-sub{color:var(--sec-a);}
.sec-hdr.b .sec-hdr-sub{color:var(--sec-b);}
.sec-badge{font-size:var(--fs-xl);font-weight:800;padding:4px 14px;border-radius:6px;}
.sec-hdr.a .sec-badge{color:var(--sec-a);background:#d1fae5;}
.sec-hdr.b .sec-badge{color:var(--sec-b);background:#ede9fe;}

/* RESULTS */
.score-card{background:var(--color-background-secondary);border-radius:var(--radius-sm);padding:18px;text-align:center;}
.score-num{font-size:var(--fs-2xl);font-weight:800;color:var(--q-blue);}
.score-lbl{font-size:var(--fs-sm);color:var(--color-text-secondary);margin-top:4px;}
.result-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--color-border-tertiary);cursor:pointer;}
.result-row:hover{background:var(--q-blue-bg);margin:0 -8px;padding:12px 8px;border-radius:6px;}
.result-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--fs-sm);font-weight:700;flex-shrink:0;}
.result-num.ok{background:#dcfce7;color:#15803d;}
.result-num.bad{background:#fee2e2;color:#b91c1c;}
.result-q{font-size:var(--fs-base);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-ans{font-size:var(--fs-xs);color:var(--color-text-secondary);}
.result-tick{font-size:var(--fs-md);font-weight:700;flex-shrink:0;}
.result-tick.ok{color:#16a34a;}
.result-tick.bad{color:#dc2626;}

/* STATUS PILL */
.pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:var(--fs-xs);font-weight:600;}
.pill.ok{background:#dcfce7;color:#15803d;}
.pill.bad{background:#fee2e2;color:#b91c1c;}
.pill.sec-a{background:#d1fae5;color:var(--sec-a);}
.pill.sec-b{background:#ede9fe;color:var(--sec-b);}
</style>

/* ── ROBUST SPEECH SYNTHESIS (works on GitHub Pages, iOS, all browsers) ── */
let _voices=[];
let _voicesReady=false;

function _loadVoices(){
  const vs=window.speechSynthesis.getVoices();
  if(vs.length){_voices=vs;_voicesReady=true;}
}
if(window.speechSynthesis){
  _loadVoices();
  window.speechSynthesis.onvoiceschanged=()=>{_loadVoices();};
  // Some browsers need a delay
  setTimeout(_loadVoices,500);
  setTimeout(_loadVoices,1500);
}

// iOS keep-alive: prevent synthesis cutting out after ~15s
let _iosKeepAlive=null;
function _startKeepAlive(){
  if(!/iphone|ipad|ipod/i.test(navigator.userAgent))return;
  clearInterval(_iosKeepAlive);
  _iosKeepAlive=setInterval(()=>{
    if(window.speechSynthesis.speaking){
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }else{clearInterval(_iosKeepAlive);}
  },10000);
}

function speakGB(text,cb){
  if(!window.speechSynthesis){cb&&cb();return;}
  window.speechSynthesis.cancel();
  const doSpeak=()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.rate=0.88;u.pitch=1.05;u.volume=1;
    const vs=window.speechSynthesis.getVoices();
    const gb=vs.find(v=>v.lang==='en-GB'&&/female|karen|serena|moira|libby|hazel/i.test(v.name))
      ||vs.find(v=>v.lang==='en-GB')
      ||vs.find(v=>v.lang.startsWith('en-GB'))
      ||vs.find(v=>v.lang.startsWith('en'));
    if(gb)u.voice=gb;
    u.onend=()=>{cb&&cb();clearInterval(_iosKeepAlive);};
    u.onerror=()=>{cb&&cb();clearInterval(_iosKeepAlive);};
    window.speechSynthesis.speak(u);
    _startKeepAlive();
  };
  // If voices not loaded yet, wait for them
  const vs=window.speechSynthesis.getVoices();
  if(vs.length){doSpeak();}
  else{
    let tries=0;
    const poll=setInterval(()=>{
      tries++;
      const v2=window.speechSynthesis.getVoices();
      if(v2.length||tries>20){clearInterval(poll);doSpeak();}
    },100);
  }
}
function stopGB(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  clearInterval(_iosKeepAlive);
}

function SpeakBtn({text}){
  const[on,setOn]=useState(false);
  const[err,setErr]=useState(false);
  const go=()=>{
    if(!window.speechSynthesis){setErr(true);return;}
    if(on){stopGB();setOn(false);return;}
    setErr(false);setOn(true);
    speakGB(text,()=>setOn(false));
  };
  return React.createElement("div",{style:{display:"inline-flex",flexDirection:"column",alignItems:"flex-start"}},
    React.createElement("button",{className:"sp-btn"+(on?" on":""),onClick:go,type:"button"},

function Tally({count}){

  for(let i=0;i<count;i++){

          React.createElement("div",null,
            React.createElement("div",{className:"sec-hdr-label"},"Section A"),
            React.createElement("div",{className:"sec-hdr-sub"},"No calculator · 20 minutes")
          ),
          React.createElement("span",{className:"sec-badge"},"A")
        ),
        React.createElement("div",{className:"topic-grid"},
          TOPICS_A.map(t=>React.createElement(TopicCard,{key:t.qIdx,...t}))
        )
      ),

      React.createElement("div",null,
        React.createElement("div",{className:"sec-hdr b"},
          React.createElement("div",null,
            React.createElement("div",{className:"sec-hdr-label"},"Section B"),
            React.createElement("div",{className:"sec-hdr-sub"},"Calculator allowed · 60 minutes")
          ),
          React.createElement("span",{className:"sec-badge"},"B")
        ),
        React.createElement("div",{className:"topic-grid"},
          TOPICS_B.map(t=>React.createElement(TopicCard,{key:t.qIdx,...t}))
        )
      )
    );
  }

  /* EXAM */
  if(screen==="exam"){
    const total=QUESTIONS.length;
    const pct=(qi/total)*100;
    const prevSec=qi>0?QUESTIONS[qi-1].sec:null;
    const sectionChange=prevSec&&prevSec!==q.sec;
    return React.createElement("div",{className:"wrap"},
      React.createElement("div",{className:"back-bar",onClick:()=>{stopGB();setScreen("cover");}},
        React.createElement("span",{className:"back-bar-arrow"},"←"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{className:"back-bar-title"},"Back to all topics"),
          React.createElement("div",{className:"back-bar-sub"},"Your progress is saved — tap any topic to jump to it")
        ),
        React.createElement("span",{className:"pill sec-"+(q.sec.toLowerCase())},"Q "+(qi+1)+"/"+total)
      ),

      React.createElement("div",{className:"prog-bar-wrap"},
        React.createElement("div",{className:"prog-bar",style:{width:pct+"%"}})
      ),

      sectionChange&&React.createElement("div",{className:"sec-hdr b",style:{marginBottom:"14px"}},
        React.createElement("div",null,
          React.createElement("div",{className:"sec-hdr-label"},"Now starting Section B"),
          React.createElement("div",{className:"sec-hdr-sub"},"You may use a calculator from here")
        ),
        React.createElement("span",{style:{fontSize:"28px"}},"🧮")
      ),

      React.createElement("div",{className:"qbox"+(checked[q.id]===true?" correct":checked[q.id]===false?" wrong":"")},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px",flexWrap:"wrap",gap:"10px"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}},
            React.createElement("span",{className:"qbox-num"},"Question "+(qi+1)),
            React.createElement("span",{className:"pill sec-"+(q.sec.toLowerCase())},"Section "+q.sec),
            checked[q.id]!==undefined&&React.createElement("span",{className:"pill "+(checked[q.id]?"ok":"bad")},checked[q.id]?"✓ Correct":"✗ Incorrect")
          ),
          React.createElement(SpeakBtn,{text:q.audio})
        ),
        q.ctx&&React.createElement("p",{className:"qbox-ctx"},q.ctx),
        React.createElement("p",{className:"qbox-q"},q.q),
        React.createElement("div",{className:"qbox-divider"},renderContent(q,ans,set,locked))
      ),

      !locked&&React.createElement("button",{className:"btn-check",onClick:doCheck},"Check my answer ✓"),

      locked&&React.createElement("div",{className:"feedback "+(checked[q.id]?"ok":"bad")},
        React.createElement("span",{className:"feedback-icon"},checked[q.id]?"✅":"❌"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{className:"feedback-title"},checked[q.id]?"Correct! Well done!":"Not quite this time."),
          React.createElement("div",{className:"feedback-text"},q.fb[checked[q.id]?"ok":"bad"])
        ),
        React.createElement(SpeakBtn,{text:q.fb[checked[q.id]?"ok":"bad"]})
      ),

      React.createElement("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}},
        React.createElement("button",{className:"btn-nav outline",style:{opacity:qi===0?0.35:1,cursor:qi===0?"default":"pointer"},onClick:()=>{if(qi>0){stopGB();setQi(qi-1);}},disabled:qi===0},"← Back"),
        React.createElement("div",{style:{flex:1}}),
        qi<total-1
          ?React.createElement("button",{className:"btn-nav solid",style:{opacity:!locked?0.35:1,cursor:!locked?"default":"pointer"},onClick:()=>{if(locked){stopGB();setQi(qi+1);}},disabled:!locked},"Next question →")
          :React.createElement("button",{className:"btn-nav solid",style:{opacity:!locked?0.35:1,cursor:!locked?"default":"pointer"},onClick:()=>{if(locked){stopGB();setScreen("results");}},disabled:!locked},"See my results →")
      )
    );
  }

  /* RESULTS */
  if(screen==="results"){
    const allIds=QUESTIONS.map(q=>q.id);
    let total=0,maxT=0;
    allIds.forEach(id=>{maxT+=MARKS[id];if(isCorrect(id))total+=MARKS[id];});
    const sa=["a1","a2","a3"].reduce((s,id)=>s+(isCorrect(id)?MARKS[id]:0),0);
    const sb=allIds.filter(id=>id.startsWith("b")).reduce((s,id)=>s+(isCorrect(id)?MARKS[id]:0),0);
    const pct=Math.round(total/maxT*100);
    const pass=total>=14;
    const msg=total>=18?"Excellent work — a brilliant score! 🌟":total>=14?"Well done — a solid pass! 👏":total>=10?"Good effort — keep practising and you'll get there! 💪":"Don't worry — have another go and you'll improve! 📚";
    const correctAnswers={a1:"19",a2:"12 labels — No",a3:"13 rows",b1:"Wednesday",b2:"9 o'clock",b3:"Rectangle",b4:"9, 11, 14, 17",b5:"Under the shelf",b6:"£5",b7:"8 ladybirds",b8:"15 g",b9:"£8",b10:"9 − 4 = 5",b11:"9 pots",b12:"17 − 3 = 14",b13:"2 more",b14:"8"};
    useEffect(()=>{speakGB(`You scored ${total} out of ${maxT}. Section A: ${sa} out of 5. Section B: ${sb} out of 15. ${pct} percent. ${msg.replace(/[🌟👏💪📚]/g,"")}`);},[]);
    return React.createElement("div",{className:"wrap"},
      React.createElement("div",{className:"back-bar",onClick:()=>{stopGB();setScreen("cover");}},
        React.createElement("span",{className:"back-bar-arrow"},"←"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{className:"back-bar-title"},"Back to all topics"),
          React.createElement("div",{className:"back-bar-sub"},"Pick any topic to practise again")
        )
      ),

      React.createElement("div",{style:{background:"var(--color-background-primary)",border:"2px solid var(--color-border-secondary)",borderRadius:"var(--radius)",padding:"24px",marginBottom:"16px"}},
        React.createElement("h2",{style:{fontSize:"var(--fs-xl)",fontWeight:"800",color:"var(--q-blue)",marginBottom:"18px"}},"Your results"),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px",marginBottom:"18px"}},
          [["Total",`${total}/${maxT}`],["Section A",`${sa}/5`],["Section B",`${sb}/15`]].map(([l,v])=>
            React.createElement("div",{key:l,className:"score-card"},
              React.createElement("div",{className:"score-num"},v),
              React.createElement("div",{className:"score-lbl"},l)
            )
          )
        ),
        React.createElement("div",{style:{height:"12px",borderRadius:"6px",background:"var(--color-background-secondary)",overflow:"hidden",marginBottom:"14px"}},
          React.createElement("div",{style:{height:"100%",width:pct+"%",background:pass?"#16a34a":"#f59e0b",borderRadius:"6px",transition:"width 0.8s"}})
        ),
        React.createElement("p",{style:{fontSize:"var(--fs-md)",fontWeight:"700",color:pass?"#15803d":"#b45309",lineHeight:1.5}},msg),
        React.createElement("div",{style:{marginTop:"12px"}},React.createElement(SpeakBtn,{text:`You scored ${total} out of ${maxT}. ${msg.replace(/[🌟👏💪📚]/g,"")}`}))
      ),

      React.createElement("div",{style:{background:"var(--color-background-primary)",border:"2px solid var(--color-border-secondary)",borderRadius:"var(--radius)",padding:"20px 18px",marginBottom:"16px"}},
        React.createElement("h3",{style:{fontSize:"var(--fs-lg)",fontWeight:"700",color:"var(--q-blue)",marginBottom:"14px"}},"Question by question"),
        QUESTIONS.map((q,i)=>{
          const c=isCorrect(q.id);
          return React.createElement("div",{key:q.id,className:"result-row",onClick:()=>{setQi(i);setScreen("exam");}},
            React.createElement("span",{className:"result-num "+(c?"ok":"bad")},i+1),
            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("p",{className:"result-q"},q.q),
              !c&&React.createElement("p",{className:"result-ans"},"✏️ Answer: "+correctAnswers[q.id])
            ),
            React.createElement("span",{style:{fontSize:"var(--fs-xs)",color:"var(--color-text-secondary)",marginRight:"6px",flexShrink:0}},"Review"),
            React.createElement("span",{className:"result-tick "+(c?"ok":"bad")},c?"✓":"✗")
          );
        })
      ),

      React.createElement("div",{style:{display:"flex",gap:"12px",flexWrap:"wrap",justifyContent:"flex-end"}},
        React.createElement("button",{className:"btn-nav outline",onClick:()=>{setAns({});setChecked({});setQi(0);setScreen("cover");}},"Start over"),
        React.createElement("button",{className:"btn-nav solid",onClick:()=>{setChecked({});setQi(0);setScreen("exam");}},"Retake paper")
      )
    );
  }
  return null;
}

const var_radius="var(--radius)";
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
